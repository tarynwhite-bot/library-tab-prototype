<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Restore Prototype</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:#030810;font-family:-apple-system,'SF Pro Display',sans-serif;min-height:100vh;display:flex;justify-content:center;align-items:center}
  @keyframes pulse{0%,80%,100%{transform:scale(0.6);opacity:0.3}40%{transform:scale(1);opacity:1}}
  @keyframes eq{from{transform:scaleY(0.3)}to{transform:scaleY(1)}}
  input::placeholder{color:rgba(255,255,255,0.25)}
  ::-webkit-scrollbar{display:none}
  *{scrollbar-width:none}
  button:focus{outline:none}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

// ── Icons ──────────────────────────────────────────────
const ChevronRight = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2.5"><polyline points="9,18 15,12 9,6"/></svg>;
const ChevronLeft  = () => <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.7)" strokeWidth="2.5"><polyline points="15,18 9,12 15,6"/></svg>;
const ChevronDown  = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.8)" strokeWidth="2.5"><polyline points="6,9 12,15 18,9"/></svg>;
const PlayFill     = () => <svg width="13" height="13" viewBox="0 0 24 24" fill="#0A0F1E"><polygon points="5,3 19,12 5,21"/></svg>;
const ArrowRight   = () => <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.4)" strokeWidth="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12,5 19,12 12,19"/></svg>;
const Sparkle      = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="#A78BFA"><path d="M12 2L13.5 9.5L21 12L13.5 14.5L12 22L10.5 14.5L3 12L10.5 9.5L12 2Z"/></svg>;
const Plus         = () => <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
const HeartIcon    = ({filled}) => <svg width="14" height="14" viewBox="0 0 24 24" fill={filled?"#ef4444":"none"} stroke={filled?"#ef4444":"white"} strokeWidth="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>;

// ── Constants ──────────────────────────────────────────
const BG="#060D1F", CARD="#162040", SHEET_BG="#0E1830";
const PEEK=0.246, FULL=0.88;

// ── Small reusable components ──────────────────────────
const Equalizer = () => (
  <div style={{display:"flex",alignItems:"flex-end",gap:"2px",height:"14px"}}>
    {[{h:60,d:"0s"},{h:100,d:"0.2s"},{h:40,d:"0.1s"},{h:80,d:"0.3s"}].map((b,i)=>(
      <div key={i} style={{width:"3px",borderRadius:"1.5px",background:"#A78BFA",height:`${b.h}%`,animation:`eq 0.8s ease-in-out ${b.d} infinite alternate`}}/>
    ))}
  </div>
);

const HeartButton = ({style={}}) => {
  const [faved,setFaved] = useState(false);
  return (
    <button onClick={e=>{e.stopPropagation();setFaved(f=>!f);}} style={{background:"rgba(0,0,0,0.35)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)",borderRadius:"50%",width:"28px",height:"28px",...style}}>
      <HeartIcon filled={faved}/>
    </button>
  );
};

const FeaturedTile = ({tile}) => {
  const [faved,setFaved] = useState(false);
  return (
    <div style={{flexShrink:0,width:"220px",cursor:"pointer"}}>
      <div style={{width:"220px",height:"140px",borderRadius:"14px",background:tile.art,marginBottom:"8px",position:"relative",overflow:"hidden"}}>
        <button onClick={e=>{e.stopPropagation();setFaved(f=>!f);}} style={{position:"absolute",top:8,right:8,width:"28px",height:"28px",borderRadius:"50%",background:"rgba(0,0,0,0.35)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",backdropFilter:"blur(6px)"}}>
          <HeartIcon filled={faved}/>
        </button>
        {tile.label&&<div style={{position:"absolute",bottom:8,left:8}}><span style={{background:"rgba(0,0,0,0.4)",color:"rgba(255,255,255,0.9)",fontSize:"9px",fontWeight:700,padding:"2px 7px",borderRadius:"20px",backdropFilter:"blur(6px)",letterSpacing:"0.05em",textTransform:"uppercase"}}>{tile.label}</span></div>}
      </div>
      <div style={{color:"rgba(255,255,255,0.85)",fontSize:"13px",fontWeight:600,lineHeight:"1.3"}}>{tile.title}</div>
      <div style={{color:"rgba(255,255,255,0.35)",fontSize:"11px",marginTop:"2px"}}>{tile.sub}</div>
    </div>
  );
};

const StatusBar = () => (
  <div style={{padding:"14px 28px 0",display:"flex",justifyContent:"space-between",alignItems:"center",flexShrink:0}}>
    <span style={{color:"#fff",fontSize:"15px",fontWeight:700}}>9:41</span>
    <div style={{display:"flex",gap:"5px",alignItems:"center"}}>
      <svg width="17" height="12" viewBox="0 0 17 12" fill="white"><rect x="0" y="4" width="3" height="8" rx="0.5"/><rect x="4.5" y="2.5" width="3" height="9.5" rx="0.5"/><rect x="9" y="0.5" width="3" height="11.5" rx="0.5"/><rect x="13.5" y="0" width="3" height="12" rx="0.5" opacity="0.3"/></svg>
      <svg width="16" height="12" viewBox="0 0 16 12" fill="white"><path d="M8 2.4C10.5 2.4 12.7 3.4 14.3 5L16 3.3C13.9 1.2 11.1 0 8 0S2.1 1.2 0 3.3L1.7 5C3.3 3.4 5.5 2.4 8 2.4z"/><path d="M8 5.6c1.5 0 2.9.6 3.9 1.6L13.6 5.5C12.1 4 10.2 3.2 8 3.2S3.9 4 2.4 5.5l1.7 1.7C5.1 6.2 6.5 5.6 8 5.6z"/><circle cx="8" cy="10" r="2"/></svg>
      <svg width="25" height="12" viewBox="0 0 25 12" fill="none"><rect x="0.5" y="0.5" width="21" height="11" rx="3.5" stroke="white" strokeOpacity="0.35"/><rect x="1" y="1" width="20" height="10" rx="3" fill="white"/><path d="M23 4v4a2 2 0 0 0 0-4z" fill="white" fillOpacity="0.4"/></svg>
    </div>
  </div>
);

const CarouselRow = ({label,items}) => (
  <div style={{margin:"20px -24px 0",paddingLeft:"24px"}}>
    <div style={{color:"#fff",fontSize:"14px",fontWeight:600,marginBottom:"10px"}}>{label}</div>
    <div style={{display:"flex",gap:"10px",overflowX:"auto",paddingBottom:"4px"}}>
      {items.map((tile,i)=><SmallTile key={i} tile={tile}/>)}
      <div style={{width:"24px",flexShrink:0}}/>
    </div>
  </div>
);

const SmallTile = ({tile}) => {
  const [added,setAdded] = useState(false);
  return (
    <div style={{flexShrink:0,width:"120px",cursor:"pointer"}}>
      <div style={{width:"120px",height:"80px",borderRadius:"12px",background:tile.art,marginBottom:"7px",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",bottom:6,left:6,width:"20px",height:"20px",borderRadius:"50%",background:"rgba(255,255,255,0.2)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5,3 19,12 5,21"/></svg>
        </div>
        <div style={{position:"absolute",bottom:0,left:0,right:0,padding:"24px 7px 6px",background:"linear-gradient(transparent,rgba(0,0,0,0.55))",display:"flex",justifyContent:"flex-end"}}>
          <button onClick={e=>{e.stopPropagation();setAdded(a=>!a);}} style={{width:"20px",height:"20px",borderRadius:"50%",background:added?"#A78BFA":"rgba(255,255,255,0.2)",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"background 0.2s"}}>
            {added?<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><polyline points="20,6 9,17 4,12"/></svg>:<Plus/>}
          </button>
        </div>
      </div>
      <div style={{color:"rgba(255,255,255,0.75)",fontSize:"12px",fontWeight:500,lineHeight:"1.3"}}>{tile.title}</div>
      <div style={{color:"rgba(255,255,255,0.35)",fontSize:"11px",marginTop:"2px"}}>{tile.sub}</div>
    </div>
  );
};

// ── Tab bar ────────────────────────────────────────────
const tabs = [
  {id:"sleep",label:"Sleep",icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" fill="currentColor"/></svg>},
  {id:"plan",label:"Plan",icon:<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>},
];
const TabBar = ({activeTab,setActiveTab}) => (
  <div style={{position:"absolute",bottom:20,left:0,right:0,display:"flex",justifyContent:"center",alignItems:"center",zIndex:20}}>
    <div style={{background:"rgba(255,255,255,0.08)",backdropFilter:"blur(40px) saturate(180%)",borderRadius:"999px",padding:"5px",display:"flex",gap:"2px",border:"1px solid rgba(255,255,255,0.14)",boxShadow:"0 8px 32px rgba(0,0,0,0.4)"}}>
      {tabs.map(tab=>{
        const active=tab.id===activeTab;
        return (
          <div key={tab.id} onClick={()=>setActiveTab(tab.id)} style={{display:"flex",alignItems:"center",gap:"6px",padding:"9px 20px",borderRadius:"999px",background:active?"linear-gradient(160deg,rgba(255,255,255,0.28),rgba(255,255,255,0.12))":"transparent",border:active?"1px solid rgba(255,255,255,0.25)":"1px solid transparent",cursor:"pointer",transition:"all 0.35s cubic-bezier(0.34,1.56,0.64,1)"}}>
            <span style={{color:active?"#fff":"rgba(255,255,255,0.4)",display:"flex",alignItems:"center"}}>{tab.icon}</span>
            <span style={{color:active?"#fff":"rgba(255,255,255,0.4)",fontSize:"13px",fontWeight:active?600:400}}>{tab.label}</span>
          </div>
        );
      })}
    </div>
  </div>
);

// ── Sleep page ─────────────────────────────────────────
const SleepPage = () => (
  <div style={{position:"absolute",inset:0,overflowY:"auto",display:"flex",flexDirection:"column"}}>
    <div style={{position:"relative",background:"linear-gradient(180deg,#0a1628 0%,#0d1f3c 40%,#162040 100%)",minHeight:"380px",overflow:"hidden",flexShrink:0}}>
      <div style={{position:"absolute",bottom:-60,left:"50%",transform:"translateX(-50%)",width:"280px",height:"280px",borderRadius:"50%",background:"radial-gradient(circle,rgba(210,180,130,0.55) 0%,rgba(180,140,90,0.2) 50%,transparent 75%)",filter:"blur(2px)"}}/>
      <div style={{position:"absolute",bottom:-60,left:"50%",transform:"translateX(-50%)",width:"220px",height:"220px",borderRadius:"50%",background:"radial-gradient(circle,rgba(230,200,150,0.7) 0%,rgba(200,160,100,0.35) 55%,transparent 75%)"}}/>
      <StatusBar/>
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 20px 0"}}>
        <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"linear-gradient(135deg,#e8a020,#c94040)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"14px"}}>🌙</div>
        <div style={{display:"flex",alignItems:"center",gap:"5px",background:"rgba(255,255,255,0.1)",borderRadius:"20px",padding:"6px 12px",cursor:"pointer"}}>
          <span style={{color:"#fff",fontSize:"13px",fontWeight:600}}>Last night</span>
          <ChevronDown/>
        </div>
        <div style={{width:"32px",height:"32px",borderRadius:"50%",background:"rgba(255,255,255,0.1)",display:"flex",alignItems:"center",justifyContent:"center"}}>
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </div>
      </div>
      <div style={{padding:"24px 28px 100px",textAlign:"center"}}>
        <p style={{color:"#fff",fontSize:"22px",fontWeight:700,lineHeight:"1.35",margin:0}}>
          You only dream about faces you've seen.{" "}
          <span style={{color:"#e8b86d"}}>Your brain can't invent new faces.</span>
        </p>
      </div>
    </div>
    <div style={{background:"rgba(14,24,48,0.98)",padding:"14px 24px",display:"flex",alignItems:"center",justifyContent:"center",gap:"16px"}}>
      <span style={{color:"#fff",fontSize:"15px",fontWeight:600}}>🌙 10:00 PM</span>
      <span style={{color:"rgba(255,255,255,0.35)",fontSize:"13px"}}>Plan</span>
      <span style={{color:"#fff",fontSize:"15px",fontWeight:600}}>7:00 AM ☀️</span>
    </div>
    <div style={{background:"rgba(14,24,48,0.98)",padding:"0 24px 20px",display:"flex",justifyContent:"center"}}>
      <button style={{background:"none",border:"1.5px solid rgba(255,255,255,0.5)",borderRadius:"30px",padding:"12px 32px",color:"#fff",fontSize:"15px",fontWeight:500,cursor:"pointer"}}>See sleep details</button>
    </div>
    <div style={{background:"rgba(14,24,48,0.98)",padding:"0 24px 120px",flex:1}}>
      <div style={{color:"#fff",fontSize:"17px",fontWeight:600,marginBottom:"14px"}}>Your sleep this week</div>
      <div style={{background:"#4a3060",borderRadius:"18px",padding:"18px 18px 20px"}}>
        <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"12px"}}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="rgba(255,255,255,0.7)"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>
          <span style={{color:"rgba(255,255,255,0.7)",fontSize:"11px",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase"}}>Bedtime Playlist Sessions</span>
        </div>
        <div style={{display:"flex",alignItems:"flex-end",justifyContent:"space-between"}}>
          <div>
            <div style={{color:"rgba(255,255,255,0.55)",fontSize:"12px",marginBottom:"4px"}}>Avg time to fall asleep</div>
            <div style={{color:"#fff",fontSize:"32px",fontWeight:700}}>15m</div>
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            {["M","TU","W","TH","F","SA","SU"].map((d,i)=>(
              <div key={d} style={{display:"flex",flexDirection:"column",alignItems:"center",gap:"4px"}}>
                <div style={{width:"22px",height:"22px",borderRadius:"50%",background:i<2?"rgba(255,255,255,0.9)":"rgba(255,255,255,0.2)"}}/>
                <span style={{color:"rgba(255,255,255,0.4)",fontSize:"9px",fontWeight:600}}>{d}</span>
              </div>
            ))}
          </div>
        </div>
      </div>
      <div style={{background:"#1e2e50",borderRadius:"18px",padding:"18px",marginTop:"12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:"11px",fontWeight:700,letterSpacing:"0.08em",textTransform:"uppercase",marginBottom:"6px"}}>Sleep Duration</div>
          <div style={{color:"#fff",fontSize:"28px",fontWeight:700}}>7h 42m</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:"12px",marginTop:"4px"}}>↑ 23 min vs last week</div>
        </div>
        <svg width="60" height="40" viewBox="0 0 60 40"><polyline points="0,35 10,28 20,30 30,15 40,20 50,10 60,18" fill="none" stroke="#4ADE80" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>
      </div>
    </div>
  </div>
);

// ── Now Playing sheet ──────────────────────────────────
const playlist = [
  {title:"Irreverent Meditations",sub:"Moonrise Horizon Light • 12 min",art:"linear-gradient(160deg,#3a1c6e,#c0392b,#e67e22)"},
  {title:"Handpan Harmony",sub:"Golden Coast Light • 22 min",art:"linear-gradient(160deg,#7d5a1e,#c9812a,#e8a020)"},
  {title:"i'll scroll 4 u",sub:"Lunar Dusk Light • 18 min",art:"linear-gradient(160deg,#1a1a2e,#2d2d5e,#8e44ad)"},
];

const NowPlayingSheet = ({track,onClose,onPowerOff}) => {
  const [volume,setVolume] = useState(54);
  const [timer,setTimer] = useState(23);
  const [isPlaying,setIsPlaying] = useState(true);
  const [dragY,setDragY] = useState(0);
  const [isDragging,setIsDragging] = useState(false);
  const dragStart = useRef(null);
  const art = playlist.find(p=>p.title===track)?.art || "linear-gradient(160deg,#3a1c6e,#c0392b,#e67e22)";
  const onPD=e=>{e.currentTarget.setPointerCapture(e.pointerId);setIsDragging(true);dragStart.current=e.clientY;};
  const onPM=e=>{if(!isDragging)return;setDragY(Math.max(0,e.clientY-dragStart.current));};
  const onPU=()=>{setIsDragging(false);if(dragY>80){setDragY(0);onClose();}else setDragY(0);};
  return (
    <div style={{position:"absolute",inset:0,zIndex:50,display:"flex",flexDirection:"column",justifyContent:"flex-end",pointerEvents:"none"}}>
      <div onClick={onClose} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)",pointerEvents:"auto"}}/>
      <div style={{position:"relative",background:"#0a1628",borderRadius:"28px 28px 44px 44px",overflow:"hidden",height:"686px",display:"flex",flexDirection:"column",transform:`translateY(${dragY}px)`,transition:isDragging?"none":"transform 0.3s cubic-bezier(0.32,0.72,0,1)",pointerEvents:"auto"}}>
        <div onPointerDown={onPD} onPointerMove={onPM} onPointerUp={onPU} onPointerCancel={onPU} style={{flexShrink:0,padding:"12px 0 0",display:"flex",alignItems:"center",justifyContent:"center",cursor:"grab",touchAction:"none"}}>
          <div style={{width:"36px",height:"4px",borderRadius:"2px",background:"rgba(255,255,255,0.25)"}}/>
        </div>
        <div style={{position:"relative",height:"220px",background:art,flexShrink:0,overflow:"hidden",margin:"12px 16px 0",borderRadius:"16px"}}>
          <div style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.2)"}}/>
          <div style={{position:"absolute",top:12,left:0,right:0,display:"flex",justifyContent:"center"}}>
            <div style={{background:"rgba(255,255,255,0.15)",borderRadius:"20px",padding:"5px 12px",display:"flex",alignItems:"center",gap:"6px",backdropFilter:"blur(10px)"}}>
              <span style={{fontSize:"11px"}}>☁️</span>
              <span style={{color:"rgba(255,255,255,0.9)",fontSize:"11px",fontWeight:600}}>Nicole's Sleep Machine</span>
            </div>
          </div>
        </div>
        <div style={{padding:"20px 28px 32px",display:"flex",flexDirection:"column",gap:"18px"}}>
          <div style={{textAlign:"center"}}>
            <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"6px",marginBottom:"4px"}}>
              <div style={{width:"9px",height:"9px",borderRadius:"50%",background:"linear-gradient(135deg,#e8a020,#c94040)"}}/>
              <span style={{color:"rgba(255,255,255,0.5)",fontSize:"12px"}}>Sunset Stargazing</span>
            </div>
            <div style={{color:"#fff",fontSize:"18px",fontWeight:700}}>{track||"Now Playing"}</div>
          </div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"32px"}}>
            <button style={{background:"none",border:"none",cursor:"pointer",opacity:0.7}}><svg width="26" height="26" viewBox="0 0 24 24" fill="white"><polygon points="19,20 9,12 19,4"/><rect x="5" y="4" width="3" height="16" fill="white"/></svg></button>
            <button onClick={()=>setIsPlaying(p=>!p)} style={{width:"54px",height:"54px",borderRadius:"50%",background:"#fff",border:"none",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 20px rgba(0,0,0,0.4)"}}>
              {isPlaying?<svg width="20" height="20" viewBox="0 0 24 24" fill="#0d1f3c"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>:<svg width="20" height="20" viewBox="0 0 24 24" fill="#0d1f3c"><polygon points="5,3 19,12 5,21"/></svg>}
            </button>
            <button style={{background:"none",border:"none",cursor:"pointer",opacity:0.7}}><svg width="26" height="26" viewBox="0 0 24 24" fill="white"><polygon points="5,4 15,12 5,20"/><rect x="16" y="4" width="3" height="16" fill="white"/></svg></button>
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <button onClick={()=>setVolume(v=>Math.max(0,v-1))} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.5)",fontSize:"18px"}}>−</button>
            <div style={{flex:1,position:"relative",height:"36px",background:"rgba(255,255,255,0.1)",borderRadius:"18px",overflow:"hidden",cursor:"pointer"}} onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setVolume(Math.round(((e.clientX-r.left)/r.width)*100));}}>

          </div>
          <div style={{display:"flex",alignItems:"center",gap:"10px"}}>
            <button onClick={()=>setTimer(v=>Math.max(0,v-1))} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.5)",fontSize:"18px"}}>−</button>
            <div style={{flex:1,position:"relative",height:"36px",background:"rgba(255,255,255,0.1)",borderRadius:"18px",overflow:"hidden",cursor:"pointer"}} onClick={e=>{const r=e.currentTarget.getBoundingClientRect();setTimer(Math.round(((e.clientX-r.left)/r.width)*60));}}>

              </div>
            </div>
            <span style={{color:"rgba(255,255,255,0.4)",fontSize:"13px",width:"24px",textAlign:"center"}}>{timer}</span>
            <button onClick={()=>setTimer(v=>Math.min(60,v+1))} style={{background:"none",border:"none",cursor:"pointer",color:"rgba(255,255,255,0.5)",fontSize:"18px"}}>+</button>
          </div>
          <div style={{display:"flex",justifyContent:"center"}}>
            <button onClick={onPowerOff} style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:"30px",padding:"13px 32px",color:"rgba(255,255,255,0.8)",fontSize:"15px",fontWeight:600,cursor:"pointer",display:"flex",alignItems:"center",gap:"8px"}}>

              Power Off
            </button>
          </div>
        </div>
      </div>
    </div>
  );
};

const CategorySheetPage = ({title, filterTabs: tabs, sections, contentByTab, gradientStart, onBack}) => {
  const [activeFilter,setActiveFilter] = useState(tabs?.[0]||null);
  const activeSections = contentByTab ? (contentByTab[activeFilter]||[]) : sections;
  return (
    <div style={{position:"absolute",inset:0,zIndex:10,display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
      <div onClick={onBack} style={{position:"absolute",inset:0,background:"rgba(0,0,0,0.5)"}}/>
      <div style={{position:"relative",background:BG,borderRadius:"24px 24px 0 0",display:"flex",flexDirection:"column",height:"92%",overflow:"hidden"}}>
        <div style={{background:`linear-gradient(180deg,${gradientStart} 0%,#1a1040 55%,transparent 100%)`,padding:"16px 20px 20px",flexShrink:0}}>
          <div style={{display:"flex",justifyContent:"center",marginBottom:"14px"}}>
            <div style={{width:"36px",height:"4px",borderRadius:"2px",background:"rgba(255,255,255,0.25)"}}/>
          </div>
          <div style={{display:"flex",alignItems:"center",marginBottom:tabs?.length?"16px":"0",position:"relative"}}>
            <button onClick={onBack} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",padding:"4px",position:"absolute",left:0}}><ChevronLeft/></button>
            <span style={{color:"#fff",fontSize:"17px",fontWeight:700,flex:1,textAlign:"center"}}>{title}</span>
          </div>
          {tabs?.length>0&&(
            <div style={{display:"flex",flexWrap:"wrap",gap:"8px",justifyContent:"center"}}>
              {tabs.map(tab=>{
                const active=tab===activeFilter;
                return <button key={tab} onClick={()=>setActiveFilter(tab)} style={{background:active?"#e8b86d":"rgba(255,255,255,0.08)",border:"none",borderRadius:"24px",padding:"9px 18px",color:active?"#0a0a1a":"rgba(255,255,255,0.7)",fontSize:"13px",fontWeight:active?600:400,cursor:"pointer",whiteSpace:"nowrap",transition:"all 0.2s"}}>{tab}</button>;
              })}
            </div>
          )}
        </div>
        <div key={activeFilter} style={{flex:1,overflowY:"auto",padding:"8px 0 100px"}}>
          {activeSections.map((section,i)=><SectionBlock key={i} section={section}/>)}
        </div>
      </div>
    </div>
  );
};

                    {label:"Alarms",onClick:()=>setShowAlarms(true),bg:"linear-gradient(160deg,#2a1a08,#7a4010)",deco:"linear-gradient(135deg,#fcd34d,#f59e0b,#b45309)"},
                  ].map((item,i)=>(
                    <div key={i} onClick={item.onClick} style={{borderRadius:"16px",background:item.bg,padding:"14px 12px",cursor:"pointer",position:"relative",overflow:"hidden",minHeight:"90px",display:"flex",flexDirection:"column",justifyContent:"flex-end"}}>
                      <div style={{position:"absolute",top:-10,right:-10,width:"70px",height:"70px",borderRadius:"12px",background:item.deco,opacity:0.7,transform:"rotate(15deg)"}}/>
                      <div style={{position:"absolute",top:6,right:6,width:"44px",height:"44px",borderRadius:"8px",background:"rgba(255,255,255,0.12)",backdropFilter:"blur(6px)"}}/>
                      <div style={{position:"relative",zIndex:1,display:"flex",alignItems:"center",gap:"4px"}}>
                        <div style={{color:"#fff",fontSize:"13px",fontWeight:700,lineHeight:"1.3"}}>{item.label}</div>
                        <ChevronRight/>
                      </div>
                    </div>
                  ))}
                </div>
                <div onClick={()=>setShowPlaylistBrowse(true)} style={{borderRadius:"16px",background:"linear-gradient(160deg,#3b1f82,#6d35c9,#8b5cf6)",padding:"18px 16px",cursor:"pointer",position:"relative",overflow:"hidden",marginBottom:"20px",display:"flex",alignItems:"center",gap:"12px"}}>
                  <div style={{position:"absolute",top:-20,right:-20,width:"110px",height:"110px",borderRadius:"50%",background:"rgba(167,139,250,0.18)"}}/>
                  <div style={{flex:1,position:"relative",zIndex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:"6px",marginBottom:"5px"}}>
                      <span style={{color:"#fff",fontSize:"15px",fontWeight:700}}>For your bedtime playlist</span>
                      <ChevronRight/>
                    </div>
                    <div style={{color:"rgba(255,255,255,0.55)",fontSize:"12px",lineHeight:"1.4"}}>Explore meditations, music, sleep sounds, and more</div>
                  </div>
                  <div style={{width:"64px",height:"64px",borderRadius:"12px",background:"linear-gradient(160deg,#7c3aed,#c026d3)",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"26px",position:"relative",zIndex:1}}>🌙</div>
                </div>
                <div style={{margin:"0 -24px",paddingLeft:"24px"}}>
                  <div style={{color:"#fff",fontSize:"16px",fontWeight:700,marginBottom:"12px"}}>Featured</div>
                  <div style={{display:"flex",gap:"12px",overflowX:"auto",paddingBottom:"4px"}}>
                    {featuredTiles.map((tile,i)=><FeaturedTile key={i} tile={tile}/>)}
                    <div style={{width:"24px",flexShrink:0}}/>
                  </div>
                </div>
              </>
            )}
          </div>
        </div>
      </div>
    </>
  );
};

// ── App root ───────────────────────────────────────────
function App() {
  const [activeTab,setActiveTab] = useState("sleep");
  const [nowPlaying,setNowPlaying] = useState(null);
  const [nowPlayingOpen,setNowPlayingOpen] = useState(false);
  return (
    <div style={{display:"flex",justifyContent:"center",padding:"24px 16px",minHeight:"100vh",alignItems:"center"}}>
      <div style={{width:"375px",height:"780px",background:BG,borderRadius:"44px",overflow:"hidden",boxShadow:"0 40px 100px rgba(0,0,0,0.8)",border:"1px solid rgba(255,255,255,0.05)",position:"relative"}}>
        {activeTab==="sleep"&&<SleepPage/>}
        {activeTab==="plan"&&<PlanPage onPlay={setNowPlaying} nowPlaying={nowPlaying}/>}
        <TabBar activeTab={activeTab} setActiveTab={setActiveTab}/>
        <button onClick={()=>setNowPlayingOpen(true)} style={{position:"absolute",bottom:20,right:20,width:"46px",height:"46px",borderRadius:"50%",background:"rgba(255,255,255,0.08)",backdropFilter:"blur(40px)",border:"1px solid rgba(167,139,250,0.3)",boxShadow:"0 8px 32px rgba(0,0,0,0.4)",display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",opacity:nowPlaying&&!nowPlayingOpen?1:0,transform:nowPlaying&&!nowPlayingOpen?"scale(1)":"scale(0.7)",transition:"opacity 0.3s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1)",pointerEvents:nowPlaying&&!nowPlayingOpen?"auto":"none",zIndex:60}}>
          <Equalizer/>
        </button>
        <div style={{position:"absolute",inset:0,borderRadius:"44px",overflow:"hidden",transform:nowPlayingOpen?"translateY(0)":"translateY(105%)",transition:"transform 0.45s cubic-bezier(0.32,0.72,0,1)",zIndex:55,pointerEvents:nowPlayingOpen?"auto":"none"}}>
          <NowPlayingSheet track={nowPlaying} onClose={()=>setNowPlayingOpen(false)} onPowerOff={()=>{setNowPlayingOpen(false);setNowPlaying(null);}}/>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
